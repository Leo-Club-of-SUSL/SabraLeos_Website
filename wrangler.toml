# Cloudflare Pages Configuration
name = "leo-club-website"
compatibility_date = "2024-09-23"

# Node.js compatibility for 'google-auth-library' and serverless functions
compatibility_flags = [ "nodejs_compat" ]

# Tell Wrangler where the static assets (built output) live.
# This is required by 'wrangler versions upload' (Wrangler 4+).
[assets]
directory = "./dist"

[vars]
# These can be defined locally for 'wrangler pages dev'.
# In production, set them in the Cloudflare Dashboard under:
# Settings > Environment Variables
# GA4_PROPERTY_ID = ""
# GOOGLE_SERVICE_ACCOUNT_EMAIL = ""
# GOOGLE_PRIVATE_KEY = ""
